version: 1
applications:
  - appRoot: eventos-historicos
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm
            - export npm_config_min_pkg_age=0
            - pnpm install --no-frozen-lockfile
        build:
          commands:
            - pnpm build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
